name: Continuous Deployment

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  static-analysis:
    name: Static Analysis (Quality Gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff codespell mypy

      - name: ruff check (linter)
        run: ruff check .

      - name: ruff format (formatter check)
        run: ruff format --check .

      - name: codespell (typo check)
        run: codespell

      - name: mypy (type check, non-blocking)
        continue-on-error: true
        run: mypy --ignore-missing-imports --install-types --non-interactive .

      - name: hadolint (Dockerfile-minitwit)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile-minitwit

      - name: hadolint (Dockerfile-flagtool)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile-flagtool

      - name: hadolint (Dockerfile-minitwit-tests)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile-minitwit-tests

      - name: shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'

  test:
    name: Test (Quality Gate)
    needs: static-analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build minitwit image (local, not pushed)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile-minitwit
          push: false
          load: true
          tags: minitwitimage:ci

      - name: Run integration / API / UI / E2E tests
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: minitwit
        run: |
          docker build -t minitwittestimage -f Dockerfile-minitwit-tests .

          docker network create test-net

          docker run -d --name mysql --network test-net \
            -e MYSQL_ROOT_PASSWORD="$MYSQL_ROOT_PASSWORD" \
            -e MYSQL_DATABASE="$MYSQL_DATABASE" \
            mysql:8

          echo "waiting for mysql..."
          timeout 120s bash -c "until docker exec mysql mysql -h 127.0.0.1 -uroot -p$MYSQL_ROOT_PASSWORD -e 'SELECT 1' $MYSQL_DATABASE >/dev/null 2>&1; do echo waiting...; sleep 3; done" || {
            echo "=== mysql container logs ==="
            docker logs mysql
            exit 1
          }

          DATABASE_URL="mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/${MYSQL_DATABASE}"

          docker run -d --name minitwit --network test-net \
            -p 8080:5000 \
            -e DATABASE_URL="$DATABASE_URL" \
            minitwitimage:ci
          docker run -d --name selenium --network=host selenium/standalone-chrome:latest

          echo "waiting on port 8080..."
          timeout 60s bash -c 'until curl -s http://localhost:8080 > /dev/null; do echo "waiting..."; sleep 2; done' || {
            echo "=== minitwit container status ==="
            docker ps -a --filter name=minitwit
            echo "=== minitwit container logs ==="
            docker logs minitwit
            exit 1
          }

          echo "waiting for selenium..."
          timeout 30s bash -c 'until curl -s http://localhost:4444/wd/hub/status > /dev/null; do echo "waiting..."; sleep 2; done'

          docker run --rm --network=host \
            -e BASE_URL=http://localhost:8080 \
            -e GUI_URL=http://localhost:8080 \
            -e SELENIUM_HUB=http://localhost:4444/wd/hub \
            minitwittestimage

  build-and-deploy:
    name: Build, Push & Deploy
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push minitwitimage
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile-minitwit
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/minitwitimage:latest

      - name: Build and push flagtoolimage
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile-flagtool
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/flagtoolimage:latest

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/minitwit.key
          chmod 600 ~/.ssh/minitwit.key
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}

      - name: Deploy to server
        env:
          DROPLET_IP: ${{ secrets.DROPLET_IP }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          scp -i ~/.ssh/minitwit.key -o StrictHostKeyChecking=no -r docker-compose.yml deploy.sh monitoring/ logging/ root@$DROPLET_IP:/vagrant/

          ssh -i ~/.ssh/minitwit.key -o StrictHostKeyChecking=no root@$DROPLET_IP "
            cd /vagrant &&
            echo \"DATABASE_URL=$DATABASE_URL\" > .env &&
            bash deploy.sh
          "
