global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # Scrape every minitwit replica.
  # `tasks.<service>` is a Swarm-internal DNS name that returns the IP of every running task,
  # unlike `<service>` which only returns one (round-robin) IP per query.
  - job_name: 'minitwit_app'
    dns_sd_configs:
      - names: ['tasks.minitwit']
        type: 'A'
        port: 5000
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # node-exporter runs in `mode: global`, so one task per node (manager + each worker).
  - job_name: 'infrastructure_node'
    dns_sd_configs:
      - names: ['tasks.node-exporter']
        type: 'A'
        port: 9100
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # Self-scrape so Prometheus health is visible in Grafana.
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
