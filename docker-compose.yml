version: '3.8'

networks:
  minitwit_net:
    driver: overlay
    attachable: true

services:
  minitwit:
    image: michaelfant/minitwitimage:latest
    env_file:
      - .env
    ports:
      - "8080:5000"
    networks:
      - minitwit_net
    deploy:
      replicas: 3
      placement:
        # Keep app off the manager: the manager is reserved for the observability stack.
        constraints:
          - node.role == worker
        # With 2 workers + 3 replicas this forces a 2/1 spread instead of 3/0.
        max_replicas_per_node: 2
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
      update_config:
        delay: 10s
        order: start-first
      restart_policy:
        condition: any

  flagtool:
    image: michaelfant/flagtoolimage:latest
    networks:
      - minitwit_net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      resources:
        limits:
          memory: 100M
        reservations:
          memory: 50M

  prometheus:
    image: prom/prometheus:latest
    # Cap retention so the TSDB never blows the manager disk.
    # 7 days of history OR 512MB on disk, whichever comes first.
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--storage.tsdb.retention.size=512MB'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - minitwit_net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 400M
        reservations:
          memory: 256M

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning/:/etc/grafana/provisioning/
      - ./monitoring/grafana/dashboards/:/var/lib/grafana/dashboards/
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - minitwit_net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 200M
        reservations:
          memory: 128M

  node-exporter:
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"
    networks:
      - minitwit_net
    deploy:
      mode: global
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

  loki:
    image: grafana/loki:2.9.4
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/loki-config.yaml
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - minitwit_net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          memory: 350M
        reservations:
          memory: 256M

  promtail:
    image: grafana/promtail:2.9.4
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    configs:
      - source: promtail_config
        target: /etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - minitwit_net
    deploy:
      mode: global
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

configs:
  promtail_config:
    name: ${PROMTAIL_CONFIG_NAME:-promtail_config}
    external: true

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
