services:
  minitwit:
    image: michaelfant/minitwitimage:latest
    env_file:
      - .env
    ports:
      - "8080:5000"
    volumes:
      - minitwit_data:/app/tmp
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3

  flagtool:
    image: michaelfant/flagtoolimage:latest
    volumes:
      - minitwit_data:/app/tmp
    restart: always

  prometheus:
    image: prom/prometheus:latest
    volumes:
    - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: always

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning/:/etc/grafana/provisioning/
      - ./monitoring/grafana/dashboards/:/var/lib/grafana/dashboards/
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: always

  node-exporter:
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"
    restart: always

volumes:
  minitwit_data: